<!DOCTYPE html>
<html>
<head>
  <title>RC Car Analog Control</title>

  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
      user-select: none;
    }

    #joystick {
      width: 220px;
      height: 220px;
      background: #333;
      border-radius: 50%;
      margin: 60px auto;
      position: relative;
      touch-action: none;
    }

    #stick {
      width: 70px;
      height: 70px;
      background: #00c853;
      border-radius: 50%;
      position: absolute;
      left: 75px;
      top: 75px;
    }
  </style>
</head>

<body>

<h2>🎮 RC Car Analog Control</h2>

<div id="joystick">
  <div id="stick"></div>
</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script>
const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

const joystick = document.getElementById("joystick");
const stick = document.getElementById("stick");

const radius = 100;
const center = 110;

joystick.addEventListener("touchmove", move);
joystick.addEventListener("touchend", reset);

function move(e){
  let rect = joystick.getBoundingClientRect();
  let x = e.touches[0].clientX - rect.left - center;
  let y = e.touches[0].clientY - rect.top - center;

  let distance = Math.sqrt(x*x + y*y);
  if (distance > radius) {
    x = x * radius / distance;
    y = y * radius / distance;
  }

  stick.style.left = (x + center - 35) + "px";
  stick.style.top = (y + center - 35) + "px";

  let nx = Math.round((x / radius) * 100);
  let ny = Math.round((y / radius) * 100);

  let data = JSON.stringify({x: nx, y: ny});
  client.publish('ankit123/car/analog', data);
}

function reset(){
  stick.style.left = "75px";
  stick.style.top = "75px";
  client.publish('ankit123/car/analog', JSON.stringify({x:0,y:0}));
}
</script>

</body>
</html>
