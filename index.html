<!DOCTYPE html>
<html>
<head>
  <title>RC Car Joystick</title>

  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
      user-select: none;
    }

    #joystick {
      width: 220px;
      height: 220px;
      background: #333;
      border-radius: 50%;
      margin: 60px auto;
      position: relative;
      touch-action: none;
    }

    #stick {
      width: 70px;
      height: 70px;
      background: #00c853;
      border-radius: 50%;
      position: absolute;
      left: 75px;
      top: 75px;
      transition: 0.05s;
    }

    input[type=range] {
      width: 80%;
    }
  </style>
</head>

<body>

<h2>🎮 Joystick Control</h2>

<div id="joystick">
  <div id="stick"></div>
</div>

<p>Speed: <span id="speedVal">150</span></p>
<input type="range" min="0" max="255" value="150" id="speedSlider">

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script>
const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

const joystick = document.getElementById("joystick");
const stick = document.getElementById("stick");

const radius = 100; // joystick radius
const center = 110; // center point

// SPEED
const slider = document.getElementById("speedSlider");
slider.oninput = function(){
  document.getElementById("speedVal").innerText = this.value;
  client.publish('ankit123/car/speed', this.value);
};

// TOUCH EVENTS
joystick.addEventListener("touchmove", move);
joystick.addEventListener("touchend", reset);

function move(e){
  let rect = joystick.getBoundingClientRect();
  let x = e.touches[0].clientX - rect.left - center;
  let y = e.touches[0].clientY - rect.top - center;

  // LIMIT inside circle (IMPORTANT FIX)
  let distance = Math.sqrt(x*x + y*y);
  if (distance > radius) {
    x = x * radius / distance;
    y = y * radius / distance;
  }

  // move stick
  stick.style.left = (x + center - 35) + "px";
  stick.style.top = (y + center - 35) + "px";

  // direction logic
  if (y < -40) send("F");
  else if (y > 40) send("B");
  else if (x < -40) send("L");
  else if (x > 40) send("R");
  else send("S");
}

function reset(){
  stick.style.left = "75px";
  stick.style.top = "75px";
  send("S");
}

function send(cmd){
  client.publish('ankit123/car/control', cmd);
}
</script>

</body>
</html>
